<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="2026 Tracker">
<meta name="theme-color" content="#080808">
<title>2026 Day Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: #080808;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    padding: 40px 16px 80px;
  }
  #app { max-width: 660px; margin: 0 auto; }

  /* Header */
  .header { text-align: center; margin-bottom: 48px; }
  .title { font-size: clamp(52px, 15vw, 72px); font-weight: 800; letter-spacing: -4px; line-height: 1; color: #fff; }
  .subtitle { font-size: 11px; font-weight: 600; color: #444; letter-spacing: 4px; text-transform: uppercase; margin-top: 6px; }

  /* Legend */
  .legend { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 24px; }
  .legend-pill {
    border-radius: 100px; padding: 5px 14px;
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    background: #161616;
  }

  /* Progress */
  .progress-wrap { margin-top: 28px; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 11px; color: #444; font-weight: 600; margin-bottom: 6px; }
  .progress-track { background: #161616; border-radius: 100px; height: 6px; overflow: hidden; border: 1px solid #222; }
  .progress-bar { height: 100%; border-radius: 100px; background: linear-gradient(90deg, #8b00ff, #00bfff); box-shadow: 0 0 12px #8b00ff66; transition: width 0.4s ease; }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin-bottom: 40px; }
  .stat-box {
    border-radius: 16px; padding: 18px 0;
    text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #111;
  }
  .stat-num { font-size: 32px; font-weight: 800; line-height: 1; }
  .stat-lbl { font-size: 8px; font-weight: 700; color: #444; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 8px; }

  /* Dot map */
  .dot-map { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 48px; }
  .dot-map-dot { width: 8px; height: 8px; border-radius: 3px; transition: all 0.2s; }

  /* Month */
  .month-block { margin-bottom: 52px; }
  .month-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .month-name { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .month-count { font-size: 11px; font-weight: 700; color: #333; }
  .month-count span { color: #fff; }

  /* Week */
  .week-block { margin-bottom: 8px; border-radius: 16px; overflow: hidden; border: 1px solid #1a1a1a; }
  .week-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; background: #111; font-size: 10px; font-weight: 700; color: #333; letter-spacing: 2px; text-transform: uppercase; }
  .week-badge { background: #161616; border: 1px solid #252525; padding: 2px 10px; border-radius: 100px; font-size: 10px; font-weight: 700; }

  /* Days grid */
  .days-grid { display: grid; gap: 1px; background: #0f0f0f; }
  .day-cell {
    background: #111; padding: 12px 4px 10px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 5px; cursor: pointer; min-height: 72px;
    transition: filter 0.15s, background 0.2s;
    user-select: none; -webkit-user-select: none;
  }
  .day-cell:active { filter: brightness(1.4); }
  .day-dow { font-size: 8px; font-weight: 700; letter-spacing: 1px; }
  .day-num { font-size: 17px; font-weight: 800; line-height: 1; }
  .day-rating { font-size: 7px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; min-height: 8px; }
  .day-dot { width: 5px; height: 5px; border-radius: 50%; transition: all 0.2s; }

  /* Summary */
  .summary-card { margin-top: 16px; background: #111; border: 1px solid #1e1e1e; border-radius: 16px; padding: 20px; }
  .summary-title { font-size: 10px; font-weight: 700; color: #333; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }
  .summary-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; }
  .summary-col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .summary-bar-track { width: 100%; height: 40px; background: #161616; border-radius: 8px; overflow: hidden; display: flex; align-items: flex-end; }
  .summary-bar-fill { width: 100%; border-radius: 6px 6px 0 0; transition: height 0.4s ease; }
  .summary-num { font-size: 16px; font-weight: 800; }
  .summary-lbl { font-size: 7px; font-weight: 700; color: #333; letter-spacing: 1px; text-transform: uppercase; }
  .summary-total { margin-top: 16px; padding-top: 14px; border-top: 1px solid #1e1e1e; display: flex; justify-content: space-between; align-items: center; }
  .summary-total-lbl { font-size: 10px; font-weight: 700; color: #333; letter-spacing: 1px; text-transform: uppercase; }
  .summary-total-val { font-size: 13px; font-weight: 800; color: #fff; }
  .summary-total-val span { color: #333; font-weight: 600; }
</style>
</head>
<body>
<div id="app"></div>

<script>
const MONTHS = [
  { name: "January",   days: 31, startDay: 4 },
  { name: "February",  days: 28, startDay: 0 },
  { name: "March",     days: 31, startDay: 0 },
  { name: "April",     days: 30, startDay: 3 },
  { name: "May",       days: 31, startDay: 5 },
  { name: "June",      days: 30, startDay: 1 },
  { name: "July",      days: 31, startDay: 3 },
  { name: "August",    days: 31, startDay: 6 },
  { name: "September", days: 30, startDay: 2 },
  { name: "October",   days: 31, startDay: 4 },
  { name: "November",  days: 30, startDay: 0 },
  { name: "December",  days: 31, startDay: 2 },
];
const DAY_NAMES = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
const RATINGS   = ["","GOATED","GOOD","OKAY","MID","BAD"];
const COLORS = {
  dot:  ["#222","#8b00ff","#39ff14","#00bfff","#ffff00","#ff2400"],
  bg:   ["#111","#1a003a","#0a1f00","#00111f","#1f1d00","#1f0400"],
  glow: ["none","0 0 18px #8b00ffaa","0 0 18px #39ff14aa","0 0 18px #00bfffaa","0 0 18px #ffff00aa","0 0 18px #ff2400aa"],
  border: ["#222","#8b00ff33","#39ff1433","#00bfff33","#ffff0033","#ff240033"],
};

const ALL_DAYS = [];
for (let mi = 0; mi < MONTHS.length; mi++)
  for (let d = 1; d <= MONTHS[mi].days; d++)
    ALL_DAYS.push({ month: mi, day: d });

let state = JSON.parse(localStorage.getItem('dt2026') || '{}');
const save = () => localStorage.setItem('dt2026', JSON.stringify(state));
const key  = (mi, d) => `${mi}-${d}`;
const getS = (mi, d) => state[key(mi, d)] || 0;

function cycle(mi, d) {
  const k = key(mi, d);
  const next = ((state[k] || 0) + 1) % 6;
  if (next === 0) delete state[k]; else state[k] = next;
  save();
  render();
}

function getWeeks(mi) {
  const { days, startDay } = MONTHS[mi];
  const weeks = []; let week = [], dow = startDay;
  for (let d = 1; d <= days; d++) {
    week.push({ day: d, dow });
    dow = (dow + 1) % 7;
    if (dow === 0 || d === days) { weeks.push(week); week = []; }
  }
  return weeks;
}

function weekNumStart(mi) {
  let w = 1;
  for (let i = 0; i < mi; i++) w += getWeeks(i).length;
  return w;
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k === 'className') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => c != null && e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
  return e;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const counts = [0,0,0,0,0,0];
  let totalRated = 0;
  ALL_DAYS.forEach(({ month, day }) => {
    const s = getS(month, day);
    if (s > 0) { counts[s]++; totalRated++; }
  });
  const pct = (totalRated / 365 * 100).toFixed(1);

  // Header
  const header = el('div', { className: 'header' },
    el('div', { className: 'title' }, '2026'),
    el('div', { className: 'subtitle' }, 'Day Tracker'),
    el('div', { className: 'legend' },
      ...RATINGS.slice(1).map((r, i) => el('div', {
        className: 'legend-pill',
        style: { color: COLORS.dot[i+1], border: `1px solid ${COLORS.dot[i+1]}44`, boxShadow: COLORS.glow[i+1].replace('18px','6px') }
      }, r))
    ),
    el('div', { className: 'progress-wrap' },
      el('div', { className: 'progress-meta' },
        el('span', null, `${totalRated} days rated`),
        el('span', null, `${pct}%`)
      ),
      el('div', { className: 'progress-track' },
        el('div', { className: 'progress-bar', style: { width: pct + '%' } })
      )
    )
  );
  app.appendChild(header);

  // Stats
  const statsRow = el('div', { className: 'stats-row' },
    ...RATINGS.slice(1).map((r, i) => el('div', {
      className: 'stat-box',
      style: { border: `1px solid ${COLORS.dot[i+1]}33`, boxShadow: `inset 0 1px 0 ${COLORS.dot[i+1]}22` }
    },
      el('div', { className: 'stat-num', style: { color: COLORS.dot[i+1], textShadow: COLORS.glow[i+1] } }, String(counts[i+1])),
      el('div', { className: 'stat-lbl' }, r)
    ))
  );
  app.appendChild(statsRow);

  // Dot map
  const dotMap = el('div', { className: 'dot-map' },
    ...ALL_DAYS.map(({ month, day }) => {
      const s = getS(month, day);
      return el('div', { className: 'dot-map-dot', style: {
        background: COLORS.dot[s],
        boxShadow: s > 0 ? COLORS.glow[s].replace('18px','5px') : 'none'
      }});
    })
  );
  app.appendChild(dotMap);

  // Months
  for (let mi = 0; mi < MONTHS.length; mi++) {
    const m = MONTHS[mi];
    const weeks = getWeeks(mi);
    const monthCounts = [0,0,0,0,0,0];
    weeks.flat().forEach(({ day }) => { const s = getS(mi, day); if (s > 0) monthCounts[s]++; });
    const monthRated = monthCounts.slice(1).reduce((a,b) => a+b, 0);
    let wNum = weekNumStart(mi);

    const monthEl = el('div', { className: 'month-block' },
      el('div', { className: 'month-header' },
        el('div', { className: 'month-name' }, m.name),
        el('div', { className: 'month-count' }, el('span', null, String(monthRated)), ` / ${m.days}`)
      )
    );

    // Weeks
    weeks.forEach((week, wi) => {
      const weekRated = week.filter(({day}) => getS(mi,day) > 0).length;
      const wn = wNum + wi;

      const weekEl = el('div', { className: 'week-block' },
        el('div', { className: 'week-header' },
          el('span', null, `Week ${wn}`),
          el('span', { className: 'week-badge', style: { color: weekRated > 0 ? '#fff' : '#333' } }, `${weekRated} / ${week.length}`)
        )
      );

      const grid = el('div', { className: 'days-grid', style: { gridTemplateColumns: `repeat(${week.length}, 1fr)` } });
      week.forEach(({ day, dow }) => {
        const s = getS(mi, day);
        const cell = el('div', {
          className: 'day-cell',
          style: { background: COLORS.bg[s] },
          onClick: () => cycle(mi, day)
        },
          el('div', { className: 'day-dow', style: { color: s > 0 ? COLORS.dot[s] + '88' : '#2a2a2a' } }, DAY_NAMES[dow]),
          el('div', { className: 'day-num', style: { color: s > 0 ? COLORS.dot[s] : '#333', textShadow: s > 0 ? COLORS.glow[s] : 'none' } }, String(day).padStart(2,'0')),
          el('div', { className: 'day-rating', style: { color: s > 0 ? COLORS.dot[s] : 'transparent' } }, RATINGS[s]),
          el('div', { className: 'day-dot', style: {
            background: s > 0 ? COLORS.dot[s] : '#222',
            boxShadow: s > 0 ? COLORS.glow[s] : 'none',
            transform: s > 0 ? 'scale(1.6)' : 'scale(1)'
          }})
        );
        grid.appendChild(cell);
      });

      weekEl.appendChild(grid);
      monthEl.appendChild(weekEl);
    });

    // Monthly summary
    const summaryGrid = el('div', { className: 'summary-grid' },
      ...RATINGS.slice(1).map((r, i) => {
        const cnt = monthCounts[i+1];
        const barPct = cnt / m.days * 100;
        return el('div', { className: 'summary-col' },
          el('div', { className: 'summary-bar-track' },
            el('div', { className: 'summary-bar-fill', style: {
              height: (cnt > 0 ? Math.max(barPct, 4) : 0) + '%',
              background: COLORS.dot[i+1],
              boxShadow: cnt > 0 ? COLORS.glow[i+1] : 'none'
            }})
          ),
          el('div', { className: 'summary-num', style: { color: cnt > 0 ? COLORS.dot[i+1] : '#2a2a2a', textShadow: cnt > 0 ? COLORS.glow[i+1] : 'none' } }, String(cnt)),
          el('div', { className: 'summary-lbl' }, r)
        );
      })
    );

    const summary = el('div', { className: 'summary-card' },
      el('div', { className: 'summary-title' }, `${m.name} Summary`),
      summaryGrid,
      el('div', { className: 'summary-total' },
        el('span', { className: 'summary-total-lbl' }, 'Total rated'),
        el('div', { className: 'summary-total-val' }, String(monthRated), el('span', null, ` / ${m.days} days`))
      )
    );

    monthEl.appendChild(summary);
    app.appendChild(monthEl);
  }
}

render();
</script>
</body>
</html>
